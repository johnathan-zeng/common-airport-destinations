<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airport Destination Comparison</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body data-page="compare">
  <div class="page-shell">
    <div class="toolbar">
      <nav class="page-nav" aria-label="App pages">
        <a class="page-link active" href="./">Compare Airports</a>
        <a class="page-link" href="matrix.html">Airport Matrix</a>
        <a class="page-link" href="gcmap.html">Great Circle Map</a>
      </nav>
      <label class="theme-picker" for="theme-select">
        <span>Theme</span>
        <select id="theme-select" aria-label="Theme preference">
          <option value="auto">Automatic</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
    </div>

    <h1>Airport Destination Comparison</h1>
    <p>Enter two airport codes (ICAO or IATA), compare airline-by-airline destination overlap, and sort by destination counts.</p>
    <div class="view-toggle" role="tablist" aria-label="Comparison view">
      <button
        id="comparison-view-table"
        class="view-toggle-button active"
        type="button"
        data-comparison-view="table"
      >
        Airline Comparison
      </button>
      <button
        id="comparison-view-matrix"
        class="view-toggle-button"
        type="button"
        data-comparison-view="matrix"
      >
        Destination Matrix
      </button>
    </div>
    <div class="form-row">
      <input type="text" id="code1" placeholder="e.g., TFU or ZUTF">
      <input type="text" id="code2" placeholder="e.g., CTU or ZUUU">
      <button id="compare-button" onclick="compareDestinations()">Compare</button>
    </div>
    <div id="output"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
